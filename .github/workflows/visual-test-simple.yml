name: Visual Test (Simple)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

      reset_baseline:
        description: 'Force reset baseline (ignore previous run)'
        required: false
        default: false
        type: boolean

permissions:
  actions:  read
  contents: read

env:
  TEST_ENV: ${{ github.event.inputs.environment || 'uat' }}

jobs:

  visual-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      # ── Clear git-committed local snapshots ──────────────────────────────
      - name: Clear local snapshots
        run: rm -rf snapshots/

      # ── Download last saved baseline (skipped when resetting) ─────────────
      - name: Download baseline
        if: ${{ github.event.inputs.reset_baseline != 'true' }}
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline
          path: snapshots/
          workflow: visual-test-simple.yml
          search_artifacts: true

      # ── Read baseline metadata to know which env/run it came from ─────────
      - name: Read baseline metadata
        run: |
          META="snapshots/baseline-meta.json"
          if [ -f "$META" ]; then
            PREV_ENV=$(jq -r '.env   // "unknown"'    "$META")
            PREV_RUN=$(jq -r '.run_number // "?"'     "$META")
            PREV_DATE=$(jq -r '.date // "unknown"'    "$META")
            echo "PREV_ENV=$PREV_ENV"   >> $GITHUB_ENV
            echo "PREV_RUN=$PREV_RUN"   >> $GITHUB_ENV
            echo "PREV_DATE=$PREV_DATE" >> $GITHUB_ENV
            echo "Baseline is from: ${PREV_ENV^^} — Run #${PREV_RUN} — ${PREV_DATE}"
            SNAPSHOT_COUNT=$(find snapshots -name '*.png' | wc -l | tr -d ' ')
            echo "BASELINE_MODE=Comparing ${PREV_ENV^^} (Run #${PREV_RUN}) → ${{ env.TEST_ENV }}^^  (${SNAPSHOT_COUNT} snapshots)" >> $GITHUB_ENV
          else
            echo "PREV_ENV=none"  >> $GITHUB_ENV
            echo "PREV_RUN="      >> $GITHUB_ENV
            echo "PREV_DATE="     >> $GITHUB_ENV
            echo "No baseline metadata found — first run or reset"
            if [ "${{ github.event.inputs.reset_baseline }}" = "true" ]; then
              echo "BASELINE_MODE=Force reset — fresh baseline generated this run" >> $GITHUB_ENV
            else
              echo "BASELINE_MODE=First run — baseline created this run" >> $GITHUB_ENV
            fi
          fi

      # ── Run tests ─────────────────────────────────────────────────────────
      # --update-snapshots=missing: compares against existing baselines (diffs
      # appear in report as failures) AND auto-creates baselines for any newly
      # added pages. Existing baselines are never silently overwritten — use
      # reset_baseline=true to intentionally accept a new visual state.
      - name: Run visual tests
        continue-on-error: true
        env:
          HTACCESS_USER: ${{ secrets.HTACCESS_USER }}
          HTACCESS_PASS: ${{ secrets.HTACCESS_PASS }}
          STUDENT_USERNAME: ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
          INSTRUCTOR_USERNAME: ${{ secrets.INSTRUCTOR_USERNAME }}
          INSTRUCTOR_PASSWORD: ${{ secrets.INSTRUCTOR_PASSWORD }}
          COMPANYADMIN_USERNAME: ${{ secrets.COMPANYADMIN_USERNAME }}
          COMPANYADMIN_PASSWORD: ${{ secrets.COMPANYADMIN_PASSWORD }}
          PROVIDER_USERNAME: ${{ secrets.PROVIDER_USERNAME }}
          PROVIDER_PASSWORD: ${{ secrets.PROVIDER_PASSWORD }}
          MULTIROLE_USERNAME: ${{ secrets.MULTIROLE_USERNAME }}
          MULTIROLE_PASSWORD: ${{ secrets.MULTIROLE_PASSWORD }}
          EVALUATOR_USERNAME: ${{ secrets.EVALUATOR_USERNAME }}
          EVALUATOR_PASSWORD: ${{ secrets.EVALUATOR_PASSWORD }}
          AUDITOR_USERNAME: ${{ secrets.AUDITOR_USERNAME }}
          AUDITOR_PASSWORD: ${{ secrets.AUDITOR_PASSWORD }}
          ASSESSOR_USERNAME: ${{ secrets.ASSESSOR_USERNAME }}
          ASSESSOR_PASSWORD: ${{ secrets.ASSESSOR_PASSWORD }}
          CONTENTEDITOR_USERNAME: ${{ secrets.CONTENTEDITOR_USERNAME }}
          CONTENTEDITOR_PASSWORD: ${{ secrets.CONTENTEDITOR_PASSWORD }}
        run: |
          START_TIME=$(date +%s)
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          if TEST_ENV=${{ env.TEST_ENV }} npx playwright test esc.visual esc.portal \
            --project=desktop \
            --workers=20 \
            --update-snapshots=missing; then
            echo "TEST_STATUS=passed" >> $GITHUB_ENV
          else
            echo "TEST_STATUS=failed" >> $GITHUB_ENV
          fi

      # ── Write baseline metadata for the next run ──────────────────────────
      - name: Write baseline metadata
        if: always()
        run: |
          mkdir -p snapshots
          cat <<EOF > snapshots/baseline-meta.json
          {
            "env":        "${{ env.TEST_ENV }}",
            "run_number": "${{ github.run_number }}",
            "run_id":     "${{ github.run_id }}",
            "branch":     "${{ github.ref_name }}",
            "date":       "$(date -u '+%Y-%m-%d %H:%M UTC')"
          }
          EOF
          echo "Baseline metadata written for next run:"
          cat snapshots/baseline-meta.json

      # ── Deploy HTML report to Cloudflare Pages ────────────────────────────
      - name: Deploy to Cloudflare Pages
        if: always()
        id: cf-deploy
        uses: cloudflare/pages-action@v1
        continue-on-error: true
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT }}
          directory:   playwright-report
          branch:      ${{ env.TEST_ENV }}

      # ── Post to Slack ─────────────────────────────────────────────────────
      - name: Notify Slack
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ENV="${{ env.TEST_ENV }}"
          STATUS="${{ env.TEST_STATUS }}"
          PREV_ENV="${{ env.PREV_ENV }}"
          PREV_RUN="${{ env.PREV_RUN }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Calculate duration
          END_TIME=$(date +%s)
          ELAPSED=$(( END_TIME - ${{ env.START_TIME }} ))
          DURATION_MIN=$(( ELAPSED / 60 ))
          DURATION_SEC=$(( ELAPSED % 60 ))
          DURATION="${DURATION_MIN}m ${DURATION_SEC}s"

          if [ "$STATUS" = "passed" ]; then
            ICON="✅"
            COLOR="#22c55e"
            STATUS_LABEL="All tests passed"
          else
            ICON="❌"
            COLOR="#ef4444"
            STATUS_LABEL="Visual differences detected"
          fi

          # Comparison label e.g.  "UAT #41  →  BETA #42"
          if [ "$PREV_ENV" = "none" ] || [ -z "$PREV_ENV" ]; then
            COMPARING="First run — no baseline yet"
          else
            COMPARING="${PREV_ENV^^} (Run #${PREV_RUN})  →  ${ENV^^} (Run #${{ github.run_number }})"
          fi

          PAYLOAD=$(cat <<JSON
          {
            "text": "${ICON} Visual Regression — ${COMPARING} — ${STATUS_LABEL}",
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🎭 Visual Regression Report",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Comparing*\n\`${COMPARING}\`" },
                      { "type": "mrkdwn", "text": "*Status*\n${ICON} ${STATUS_LABEL}" },
                      { "type": "mrkdwn", "text": "*Current env*\n\`${ENV^^}\`" },
                      { "type": "mrkdwn", "text": "*Duration*\n${DURATION}" }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "📊 View HTML Report", "emoji": true },
                        "url": "${REPORT_URL}",
                        "style": "primary"
                      },
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "⚙️ View Run #${{ github.run_number }}", "emoji": true },
                        "url": "${RUN_URL}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          JSON
          )

          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

      # ── Write job summary ─────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          ENV="${{ env.TEST_ENV }}"
          PREV_ENV="${{ env.PREV_ENV }}"
          PREV_RUN="${{ env.PREV_RUN }}"
          PREV_DATE="${{ env.PREV_DATE }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"
          case "$ENV" in
            dev)  BASE_URL="https://drupal.dev.energysafetycanada.com" ;;
            test) BASE_URL="https://drupal.test.energysafetycanada.com" ;;
            uat)  BASE_URL="https://drupal.uat.energysafetycanada.com" ;;
            beta) BASE_URL="https://beta.energysafetycanada.com" ;;
            prod) BASE_URL="https://energysafetycanada.com" ;;
            *)    BASE_URL="$ENV" ;;
          esac

          if [ "$PREV_ENV" = "none" ] || [ -z "$PREV_ENV" ]; then
            COMPARING="First run — baseline created"
          else
            COMPARING="\`${PREV_ENV^^}\` Run #${PREV_RUN} (${PREV_DATE})  →  \`${ENV^^}\` Run #${{ github.run_number }}"
          fi

          {
            echo "## Visual Regression Test Run"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Comparing** | ${COMPARING} |"
            echo "| **Current environment** | \`${ENV^^}\` |"
            echo "| **Base URL** | $BASE_URL |"
            echo "| **Viewport** | Desktop — 1440 × 900 |"
            echo "| **Status** | ${{ env.TEST_STATUS == 'passed' && '✅ Passed' || '❌ Failed' }} |"
            echo "| **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            if [ -n "$REPORT_URL" ]; then
              echo "| **HTML Report** | [$REPORT_URL]($REPORT_URL) |"
            fi
          } >> $GITHUB_STEP_SUMMARY

      # ── Always save current run's snapshots as baseline for next run ─────
      - name: Save baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline
          path: snapshots/
          retention-days: 90
          overwrite: true
