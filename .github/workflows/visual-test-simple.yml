name: Visual Test (Simple)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

      reset_baseline:
        description: 'Force reset baseline (ignore previous run)'
        required: false
        default: false
        type: boolean

permissions:
  actions:  read
  contents: read

env:
  TEST_ENV: ${{ github.event.inputs.environment || 'uat' }}

jobs:

  visual-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      # ── Clear git-committed local snapshots ──────────────────────────────
      - name: Clear local snapshots
        run: rm -rf snapshots/

      # ── Download last saved baseline (skipped when resetting) ─────────────
      - name: Download baseline
        if: ${{ github.event.inputs.reset_baseline != 'true' }}
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline
          path: snapshots/
          workflow: visual-test-simple.yml
          search_artifacts: true

      - name: Debug snapshots
        run: |
          if [ -d "snapshots" ] && [ -n "$(ls -A snapshots 2>/dev/null)" ]; then
            echo "Baseline loaded:"
            ls -R snapshots
          else
            echo "No baseline found — first run, all snapshots will be created"
          fi

      # ── Run tests — capture exit code for Slack status ───────────────────
      - name: Run visual tests
        continue-on-error: true
        env:
          HTACCESS_USER: ${{ secrets.HTACCESS_USER }}
          HTACCESS_PASS: ${{ secrets.HTACCESS_PASS }}
          STUDENT_USERNAME: ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.reset_baseline }}" = "true" ]; then
            echo "BASELINE_MODE=Force reset — fresh baseline generated this run" >> $GITHUB_ENV
          elif [ ! -d "snapshots" ] || [ -z "$(ls -A snapshots 2>/dev/null)" ]; then
            echo "BASELINE_MODE=First run — baseline created this run" >> $GITHUB_ENV
          else
            echo "BASELINE_MODE=Compared against previous run ($(find snapshots -name '*.png' | wc -l | tr -d ' ') snapshots)" >> $GITHUB_ENV
          fi

          if TEST_ENV=${{ env.TEST_ENV }} npx playwright test esc.visual esc.portal \
            --project=desktop \
            --grep "Home|Portal \[student\]" \
            --update-snapshots=changed; then
            echo "TEST_STATUS=passed" >> $GITHUB_ENV
          else
            echo "TEST_STATUS=failed" >> $GITHUB_ENV
          fi

      # ── Merge blob reports into one consolidated HTML report ──────────────
      - name: Generate HTML report
        if: always()
        run: npx playwright merge-reports --reporter html ./blob-report

      # ── Deploy HTML report to Cloudflare Pages ────────────────────────────
      # Each environment is deployed as its own branch alias, giving a stable
      # per-environment URL: https://{env}.{project}.pages.dev
      - name: Deploy to Cloudflare Pages
        if: always()
        id: cf-deploy
        uses: cloudflare/pages-action@v1
        continue-on-error: true
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT }}
          directory:   playwright-report
          branch:      ${{ env.TEST_ENV }}

      # ── Post to Slack ─────────────────────────────────────────────────────
      - name: Notify Slack
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ENV="${{ env.TEST_ENV }}"
          STATUS="${{ env.TEST_STATUS }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$STATUS" = "passed" ]; then
            ICON="✅"
            COLOR="#22c55e"
            STATUS_LABEL="All tests passed"
          else
            ICON="❌"
            COLOR="#ef4444"
            STATUS_LABEL="Tests failed — visual differences detected"
          fi

          # Build the Slack Block Kit payload
          PAYLOAD=$(cat <<JSON
          {
            "text": "${ICON} Visual Regression — ${ENV^^} — ${STATUS_LABEL}",
            "attachments": [
              {
                "color": "${COLOR}",
                "blocks": [
                  {
                    "type": "header",
                    "text": {
                      "type": "plain_text",
                      "text": "🎭 Visual Regression Report",
                      "emoji": true
                    }
                  },
                  {
                    "type": "section",
                    "fields": [
                      { "type": "mrkdwn", "text": "*Environment*\n\`${ENV^^}\`" },
                      { "type": "mrkdwn", "text": "*Status*\n${ICON} ${STATUS_LABEL}" },
                      { "type": "mrkdwn", "text": "*Branch*\n\`${{ github.ref_name }}\`" },
                      { "type": "mrkdwn", "text": "*Baseline*\n${{ env.BASELINE_MODE }}" }
                    ]
                  },
                  {
                    "type": "actions",
                    "elements": [
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "📊 View HTML Report", "emoji": true },
                        "url": "${REPORT_URL}",
                        "style": "primary"
                      },
                      {
                        "type": "button",
                        "text": { "type": "plain_text", "text": "⚙️ View Run #${{ github.run_number }}", "emoji": true },
                        "url": "${RUN_URL}"
                      }
                    ]
                  }
                ]
              }
            ]
          }
          JSON
          )

          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

      # ── Write job summary ─────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          ENV="${{ env.TEST_ENV }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"
          case "$ENV" in
            dev)  BASE_URL="https://drupal.dev.energysafetycanada.com" ;;
            test) BASE_URL="https://drupal.test.energysafetycanada.com" ;;
            uat)  BASE_URL="https://drupal.uat.energysafetycanada.com" ;;
            beta) BASE_URL="https://beta.energysafetycanada.com" ;;
            prod) BASE_URL="https://energysafetycanada.com" ;;
            *)    BASE_URL="$ENV" ;;
          esac
          {
            echo "## Visual Regression Test Run"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Environment** | \`${ENV^^}\` |"
            echo "| **Base URL** | $BASE_URL |"
            echo "| **Pages tested** | Home (public), Portal \[student\] |"
            echo "| **Viewport** | Desktop — 1440 × 900 |"
            echo "| **Baseline** | ${{ env.BASELINE_MODE }} |"
            echo "| **Status** | ${{ env.TEST_STATUS == 'passed' && '✅ Passed' || '❌ Failed' }} |"
            echo "| **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            if [ -n "$REPORT_URL" ]; then
              echo "| **HTML Report** | [$REPORT_URL]($REPORT_URL) |"
            fi
          } >> $GITHUB_STEP_SUMMARY

      # ── Always save current run's snapshots as baseline for next run ─────
      - name: Save baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline
          path: snapshots/
          retention-days: 90
          overwrite: true
