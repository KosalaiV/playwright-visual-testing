name: Visual Test (Simple)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

      reset_baseline:
        description: 'Force reset baseline (ignore previous run)'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

env:
  TEST_ENV: ${{ github.event.inputs.environment || 'uat' }}

jobs:

  visual-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      # ── Clear git-committed local snapshots ──────────────────────────────
      - name: Clear local snapshots
        run: rm -rf snapshots/

      # ── Download last saved baseline (skipped when resetting) ─────────────
      - name: Download baseline
        if: ${{ github.event.inputs.reset_baseline != 'true' }}
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline
          path: snapshots/
          workflow: visual-test-simple.yml
          workflow_conclusion: success
          search_artifacts: true

      - name: Debug snapshots
        run: |
          if [ -d "snapshots" ] && [ -n "$(ls -A snapshots 2>/dev/null)" ]; then
            echo "Baseline loaded:"
            ls -R snapshots
          else
            echo "No baseline found — first run, all snapshots will be created"
          fi

      # ── Run all tests in parallel (Playwright handles workers internally) ──
      # --update-snapshots=changed: takes new screenshots every run and writes
      # them back to snapshots/ so the saved baseline always reflects the
      # latest run. Tests still FAIL when screenshots change, so you get real
      # failure signal in the report. On first run (no baseline), all snapshots
      # are created. On reset_baseline runs the download is skipped above so
      # everything is regenerated fresh.
      - name: Run visual tests
        continue-on-error: true
        env:
          HTACCESS_USER: ${{ secrets.HTACCESS_USER }}
          HTACCESS_PASS: ${{ secrets.HTACCESS_PASS }}
          STUDENT_USERNAME: ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.reset_baseline }}" = "true" ]; then
            echo "BASELINE_MODE=Force reset — fresh baseline generated this run" >> $GITHUB_ENV
          elif [ ! -d "snapshots" ] || [ -z "$(ls -A snapshots 2>/dev/null)" ]; then
            echo "BASELINE_MODE=First run — baseline created this run" >> $GITHUB_ENV
          else
            echo "BASELINE_MODE=Compared against previous run ($(find snapshots -name '*.png' | wc -l | tr -d ' ') snapshots)" >> $GITHUB_ENV
          fi
          TEST_ENV=${{ env.TEST_ENV }} npx playwright test esc.visual esc.portal \
            --project=desktop \
            --grep "Home|Portal \[student\]" \
            --update-snapshots=changed

      # ── Merge blob reports into one consolidated HTML report ──────────────
      - name: Generate consolidated HTML report
        if: always()
        run: npx playwright merge-reports --reporter html ./blob-report

      # ── Upload consolidated HTML report ───────────────────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: playwright-report/
          retention-days: 7

      # ── Write job summary ─────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          ENV="${{ env.TEST_ENV }}"
          case "$ENV" in
            dev)  URL="https://drupal.dev.energysafetycanada.com" ;;
            test) URL="https://drupal.test.energysafetycanada.com" ;;
            uat)  URL="https://drupal.uat.energysafetycanada.com" ;;
            beta) URL="https://beta.energysafetycanada.com" ;;
            prod) URL="https://energysafetycanada.com" ;;
            *)    URL="$ENV" ;;
          esac
          {
            echo "## Visual Regression Test Run"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Environment** | \`${ENV^^}\` |"
            echo "| **Base URL** | $URL |"
            echo "| **Pages tested** | Home (public), Portal \[student\] |"
            echo "| **Viewport** | Desktop — 1440 × 900 |"
            echo "| **Baseline** | ${{ env.BASELINE_MODE }} |"
            echo "| **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> $GITHUB_STEP_SUMMARY

      # ── Always save current run's snapshots as baseline for next run ─────
      - name: Save baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline
          path: snapshots/
          retention-days: 90
          overwrite: true
