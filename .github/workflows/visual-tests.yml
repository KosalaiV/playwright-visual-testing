name: Visual Regression Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

      update_baseline:
        description: 'Generate new baseline snapshots (use on first run or to reset baseline)'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: visual-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_ENV: ${{ github.event.inputs.environment || 'uat' }}

jobs:

  # ─────────────────────────────────────────────────────────────
  # SETUP
  # ─────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

  # ─────────────────────────────────────────────────────────────
  # PUBLIC TESTS
  # ─────────────────────────────────────────────────────────────
  public:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/3', '2/3', '3/3']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.setup.outputs.playwright-version }}

      - run: npx playwright install-deps chromium

      # 🔥 Download baseline (from selected env)
      - name: Download baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline
          path: snapshots/
          workflow: visual-tests.yml
          workflow_conclusion: success
          search_artifacts: true

      - name: Debug snapshots
        run: ls -R snapshots || echo "No baseline found"

      - name: Run public tests
        run: |
          ENV="${{ env.TEST_ENV }}"

          SHARD="${{ matrix.shard }}"
          UPDATE_FLAG=""
          [ "${{ github.event.inputs.update_baseline }}" = "true" ] && UPDATE_FLAG="--update-snapshots"
          echo "▶ Running [$ENV] tests against last [$ENV] baseline"
          TEST_ENV=$ENV npx playwright test esc.visual --shard="$SHARD" --pass-with-no-tests $UPDATE_FLAG

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-public-${{ strategy.job-index }}
          path: snapshots/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # PORTAL TESTS
  # ─────────────────────────────────────────────────────────────
  portal:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        role:
          - student
          - instructor
          - companyadmin
          - provider
          - multirole
          - evaluator
          - auditor
          - assessor
          - contenteditor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.setup.outputs.playwright-version }}

      - run: npx playwright install-deps chromium

      - name: Download baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline
          path: snapshots/
          workflow: visual-tests.yml
          workflow_conclusion: success
          search_artifacts: true

      - name: Debug snapshots
        run: ls -R snapshots || echo "No baseline found"

      - name: Run portal tests
        env:
          STUDENT_USERNAME: ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
          INSTRUCTOR_USERNAME: ${{ secrets.INSTRUCTOR_USERNAME }}
          INSTRUCTOR_PASSWORD: ${{ secrets.INSTRUCTOR_PASSWORD }}
          COMPANYADMIN_USERNAME: ${{ secrets.COMPANYADMIN_USERNAME }}
          COMPANYADMIN_PASSWORD: ${{ secrets.COMPANYADMIN_PASSWORD }}
          PROVIDER_USERNAME: ${{ secrets.PROVIDER_USERNAME }}
          PROVIDER_PASSWORD: ${{ secrets.PROVIDER_PASSWORD }}
          MULTIROLE_USERNAME: ${{ secrets.MULTIROLE_USERNAME }}
          MULTIROLE_PASSWORD: ${{ secrets.MULTIROLE_PASSWORD }}
          EVALUATOR_USERNAME: ${{ secrets.EVALUATOR_USERNAME }}
          EVALUATOR_PASSWORD: ${{ secrets.EVALUATOR_PASSWORD }}
          AUDITOR_USERNAME: ${{ secrets.AUDITOR_USERNAME }}
          AUDITOR_PASSWORD: ${{ secrets.AUDITOR_PASSWORD }}
          ASSESSOR_USERNAME: ${{ secrets.ASSESSOR_USERNAME }}
          ASSESSOR_PASSWORD: ${{ secrets.ASSESSOR_PASSWORD }}
          CONTENTEDITOR_USERNAME: ${{ secrets.CONTENTEDITOR_USERNAME }}
          CONTENTEDITOR_PASSWORD: ${{ secrets.CONTENTEDITOR_PASSWORD }}
        run: |
          ENV="${{ env.TEST_ENV }}"

          ROLE="${{ matrix.role }}"
          GREP="Portal \[$ROLE\]"
          UPDATE_FLAG=""
          [ "${{ github.event.inputs.update_baseline }}" = "true" ] && UPDATE_FLAG="--update-snapshots"
          echo "▶ Running [$ENV] tests against last [$ENV] baseline"
          TEST_ENV=$ENV npx playwright test esc.portal --grep "$GREP" --pass-with-no-tests $UPDATE_FLAG

      - name: Upload snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-portal-${{ matrix.role }}
          path: snapshots/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # SAVE BASELINE
  # ─────────────────────────────────────────────────────────────
  save-baseline:
    runs-on: ubuntu-latest
    needs: [public, portal]
    if: |
      (needs.public.result == 'success' && needs.portal.result == 'success') ||
      (github.event.inputs.update_baseline == 'true' && needs.public.result == 'success')

    steps:
      - name: Download all snapshots
        uses: actions/download-artifact@v4
        with:
          pattern: snapshots-*
          path: snapshots/
          merge-multiple: true

      - name: Upload baseline
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline
          path: snapshots/
          retention-days: 90
          overwrite: true