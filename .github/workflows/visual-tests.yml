name: Visual Regression Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

      baseline_env:
        description: 'Baseline Environment (for comparison)'
        required: false
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

permissions:
  actions: read
  contents: read

concurrency:
  group: visual-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_ENV: ${{ github.event.inputs.environment || 'uat' }}
  BASELINE_ENV: ${{ github.event.inputs.baseline_env || 'uat' }}

jobs:

  # ─────────────────────────────────────────────────────────────
  # SETUP
  # ─────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - id: playwright-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

  # ─────────────────────────────────────────────────────────────
  # PUBLIC TESTS
  # ─────────────────────────────────────────────────────────────
  public:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        shard: ['1/3', '2/3', '3/3']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.setup.outputs.playwright-version }}

      - run: npx playwright install-deps chromium

      # 🔥 Download baseline (from selected env)
      - name: Download baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline-${{ env.BASELINE_ENV }}
          path: snapshots/
          workflow: visual-tests.yml
          workflow_conclusion: success
          search_artifacts: true

      - name: Debug snapshots
        run: ls -R snapshots || echo "No baseline found"

      - name: Run public tests
        run: |
          ENV="${{ env.TEST_ENV }}"
          BASE="${{ env.BASELINE_ENV }}"
          SHARD="${{ matrix.shard }}"
          echo "▶ Comparing [$ENV] against baseline [$BASE]"
          TEST_ENV=$ENV npx playwright test esc.visual --shard="$SHARD" --pass-with-no-tests

      - name: Upload snapshots
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: snapshots-public-${{ strategy.job-index }}
          path: snapshots/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # PORTAL TESTS
  # ─────────────────────────────────────────────────────────────
  portal:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        role:
          - student
          - instructor
          - companyadmin
          - provider
          - multirole
          - evaluator
          - auditor
          - assessor
          - contenteditor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ needs.setup.outputs.playwright-version }}

      - run: npx playwright install-deps chromium

      - name: Download baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline-${{ env.BASELINE_ENV }}
          path: snapshots/
          workflow: visual-tests.yml
          workflow_conclusion: success
          search_artifacts: true

      - name: Debug snapshots
        run: ls -R snapshots || echo "No baseline found"

      - name: Run portal tests
        run: |
          ENV="${{ env.TEST_ENV }}"
          BASE="${{ env.BASELINE_ENV }}"
          ROLE="${{ matrix.role }}"
          GREP="Portal \[$ROLE\]"
          echo "▶ Comparing [$ENV] against baseline [$BASE]"
          TEST_ENV=$ENV npx playwright test esc.portal --grep "$GREP" --pass-with-no-tests

  # ─────────────────────────────────────────────────────────────
  # SAVE BASELINE
  # ─────────────────────────────────────────────────────────────
  save-baseline:
    runs-on: ubuntu-latest
    needs: [public, portal]
    if: needs.public.result == 'success' && needs.portal.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Download all snapshots
        uses: actions/download-artifact@v4
        with:
          pattern: snapshots-*
          path: snapshots/
          merge-multiple: true

      - name: Update snapshots (create new baseline)
        run: TEST_ENV=${{ env.TEST_ENV }} npx playwright test --update-snapshots --pass-with-no-tests

      - name: Upload baseline
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline-${{ env.TEST_ENV }}
          path: snapshots/
          retention-days: 90
          overwrite: true