name: Visual Cross-Browser

# ─────────────────────────────────────────────────────────────────────────────
# 9 parallel runners: 3 browsers × 3 shards each → ~25-35 min wall-clock
#
#   Browsers  : Chrome · Firefox · Safari
#   Viewports : Desktop · Tablet · Mobile  (all in each runner)
#
# How sharding works:
#   Playwright divides the full test list equally across N runners.
#   With 690 tests per browser, each shard gets ~230 tests.
#   At 8 workers + ~35s/test → ~17 min test time per shard (was 51 min).
#
# Runner layout (all 9 start simultaneously):
#   chromium-1  chromium-2  chromium-3
#   firefox-1   firefox-2   firefox-3
#   webkit-1    webkit-2    webkit-3
#        └─────────────────────────┘
#                    │
#            merge-and-report   ← combines 9 blob reports → HTML → Cloudflare
#
# Why compute-matrix exists:
#   GitHub Actions does not allow `matrix.browser` in a job-level `if`.
#   Instead, a compute-matrix job builds the browser list from the `browsers`
#   input and the test job uses fromJson() on that output — so only the
#   selected browser(s) actually spin up runners.
#
# Baseline isolation:
#   Each browser has its own artifact: visual-cb-baseline-<env>-<browser>
#   Merge job applies:
#     (a) snapshot-delta  — new baselines from --update-snapshots=missing
#     (b) test-actuals    — roll-forward of changed pages' actual screenshots
#   All 3 shards' changes are applied so every changed page gets rolled forward.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

      baseline_env:
        description: 'Baseline env to compare against (leave empty = same as environment)'
        required: false
        default: ''
        type: string

      browsers:
        description: 'Which browsers to run'
        required: false
        default: 'all'
        type: choice
        options: [all, chromium-only, firefox-only, webkit-only]

permissions:
  actions: read
  contents: read

env:
  TEST_ENV:     ${{ github.event.inputs.environment || 'uat' }}
  BASELINE_ENV: ${{ github.event.inputs.baseline_env || github.event.inputs.environment || 'uat' }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Capture wall-clock start (used in Slack duration) ─────────────────────
  record-start:
    runs-on: ubuntu-latest
    outputs:
      start-time: ${{ steps.t.outputs.time }}
    steps:
      - id: t
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

  # ── Build browser list from the `browsers` input ──────────────────────────
  # GitHub Actions does not allow `matrix.browser` in a job-level `if`, so we
  # derive the browser list here and pass it via fromJson() to the test matrix.
  compute-matrix:
    runs-on: ubuntu-latest
    outputs:
      browsers: ${{ steps.set.outputs.browsers }}
    steps:
      - id: set
        run: |
          case "${{ github.event.inputs.browsers || 'all' }}" in
            chromium-only) echo 'browsers=["chromium"]'                    >> $GITHUB_OUTPUT ;;
            firefox-only)  echo 'browsers=["firefox"]'                     >> $GITHUB_OUTPUT ;;
            webkit-only)   echo 'browsers=["webkit"]'                      >> $GITHUB_OUTPUT ;;
            *)             echo 'browsers=["chromium","firefox","webkit"]'  >> $GITHUB_OUTPUT ;;
          esac

  # ── 9 parallel shard jobs ─────────────────────────────────────────────────
  test:
    name: "${{ matrix.browser }} · shard ${{ matrix.shard }}/3"
    runs-on: ubuntu-latest
    needs: [record-start, compute-matrix]

    strategy:
      fail-fast: false
      matrix:
        browser: ${{ fromJson(needs.compute-matrix.outputs.browsers) }}
        shard:   [1, 2, 3]

    steps:

      # ── Checkout & install ───────────────────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Always install Chromium (required by global-setup.ts which calls chromium.launch()
      # for auth state creation — regardless of which browser shard is running).
      # Then install the shard's own browser for the actual visual tests.
      - run: npx playwright install chromium ${{ matrix.browser }} --with-deps

      # ── Derive --project flags from browser name ──────────────────────────
      # (cannot use matrix `include` because the browser list is dynamic)
      - name: Set project flags
        run: |
          case "${{ matrix.browser }}" in
            chromium)
              echo "PROJECTS=--project=desktop-chromium --project=tablet-chromium --project=mobile-chromium" >> $GITHUB_ENV ;;
            firefox)
              echo "PROJECTS=--project=desktop-firefox --project=tablet-firefox --project=mobile-firefox" >> $GITHUB_ENV ;;
            webkit)
              echo "PROJECTS=--project=desktop-webkit --project=tablet-webkit --project=mobile-webkit" >> $GITHUB_ENV ;;
          esac

      # ── Download browser-specific baseline ───────────────────────────────
      - name: Clear local snapshots
        run: rm -rf snapshots/

      - name: Download baseline (${{ matrix.browser }})
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name:             visual-cb-baseline-${{ env.BASELINE_ENV }}-${{ matrix.browser }}
          path:             snapshots/
          workflow:         visual-cross-browser.yml
          search_artifacts: true

      - name: Log baseline
        run: |
          META="snapshots/baseline-meta.json"
          if [ -f "$META" ]; then
            SNAPS=$(find snapshots -name '*.png' | wc -l | tr -d ' ')
            echo "Baseline: Run #$(jq -r '.run_number // "?"' "$META") — $SNAPS snapshots"
          else
            echo "No baseline found — first run for ${{ matrix.browser }}"
          fi

      # ── Record pre-run snapshot list (for delta detection after tests) ────
      - name: Record pre-run snapshot list
        run: |
          find snapshots -name '*.png' | sed 's|^snapshots/||' | sort \
            > /tmp/before-snapshots.txt
          echo "Pre-run snapshots: $(wc -l < /tmp/before-snapshots.txt)"

      # ── Run this shard ───────────────────────────────────────────────────
      - name: Run visual tests (${{ matrix.browser }} · shard ${{ matrix.shard }}/3)
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: results-${{ matrix.browser }}-${{ matrix.shard }}.json
          HTACCESS_USER:          ${{ secrets.HTACCESS_USER }}
          HTACCESS_PASS:          ${{ secrets.HTACCESS_PASS }}
          STUDENT_USERNAME:       ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD:       ${{ secrets.STUDENT_PASSWORD }}
          INSTRUCTOR_USERNAME:    ${{ secrets.INSTRUCTOR_USERNAME }}
          INSTRUCTOR_PASSWORD:    ${{ secrets.INSTRUCTOR_PASSWORD }}
          COMPANYADMIN_USERNAME:  ${{ secrets.COMPANYADMIN_USERNAME }}
          COMPANYADMIN_PASSWORD:  ${{ secrets.COMPANYADMIN_PASSWORD }}
          PROVIDER_USERNAME:      ${{ secrets.PROVIDER_USERNAME }}
          PROVIDER_PASSWORD:      ${{ secrets.PROVIDER_PASSWORD }}
          MULTIROLE_USERNAME:     ${{ secrets.MULTIROLE_USERNAME }}
          MULTIROLE_PASSWORD:     ${{ secrets.MULTIROLE_PASSWORD }}
          EVALUATOR_USERNAME:     ${{ secrets.EVALUATOR_USERNAME }}
          EVALUATOR_PASSWORD:     ${{ secrets.EVALUATOR_PASSWORD }}
          AUDITOR_USERNAME:       ${{ secrets.AUDITOR_USERNAME }}
          AUDITOR_PASSWORD:       ${{ secrets.AUDITOR_PASSWORD }}
          ASSESSOR_USERNAME:      ${{ secrets.ASSESSOR_USERNAME }}
          ASSESSOR_PASSWORD:      ${{ secrets.ASSESSOR_PASSWORD }}
          CONTENTEDITOR_USERNAME: ${{ secrets.CONTENTEDITOR_USERNAME }}
          CONTENTEDITOR_PASSWORD: ${{ secrets.CONTENTEDITOR_PASSWORD }}
        run: |
          TEST_ENV=${{ env.TEST_ENV }} npx playwright test esc.visual esc.portal \
            $PROJECTS \
            --shard=${{ matrix.shard }}/3 \
            --workers=8 \
            --update-snapshots=missing \
            --reporter=blob,github,json

      # ── Collect only new snapshots (delta vs pre-run list) ───────────────
      # Keeps the artifact small on normal runs — only new pages have deltas.
      - name: Collect snapshot delta
        if: always()
        run: |
          find snapshots -name '*.png' | sed 's|^snapshots/||' | sort \
            > /tmp/after-snapshots.txt

          mkdir -p snapshot-delta
          comm -13 /tmp/before-snapshots.txt /tmp/after-snapshots.txt \
            | while IFS= read -r rel; do
                dest_dir="snapshot-delta/$(dirname "$rel")"
                mkdir -p "$dest_dir"
                cp "snapshots/$rel" "$dest_dir/"
              done

          echo "New snapshots this shard: $(find snapshot-delta -name '*.png' | wc -l)"

      # ── Collect actual screenshots from failing tests ─────────────────────
      - name: Collect test actuals
        if: always()
        run: |
          mkdir -p test-actuals
          find test-results -name '*-actual.png' \
            -exec cp {} test-actuals/ \; 2>/dev/null || true
          echo "Actuals: $(find test-actuals -name '*.png' | wc -l)"

      # ── Upload artifacts for the merge job ───────────────────────────────
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:            blob-report-${{ matrix.browser }}-${{ matrix.shard }}
          path:            blob-report/
          retention-days:  1

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:            json-results-${{ matrix.browser }}-${{ matrix.shard }}
          path:            results-${{ matrix.browser }}-${{ matrix.shard }}.json
          retention-days:  1
          if-no-files-found: warn

      - name: Upload snapshot delta
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:            snapshot-delta-${{ matrix.browser }}-${{ matrix.shard }}
          path:            snapshot-delta/
          retention-days:  1
          if-no-files-found: ignore

      - name: Upload test actuals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:            test-actuals-${{ matrix.browser }}-${{ matrix.shard }}
          path:            test-actuals/
          retention-days:  1
          if-no-files-found: ignore

  # ── Merge reports + aggregate stats + save baselines ─────────────────────
  merge-and-report:
    name: Merge · Report · Save Baseline
    runs-on: ubuntu-latest
    needs: [record-start, compute-matrix, test]
    if: always()

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      # No browser binaries needed — merge-reports is CLI-only

      # ── HTML report: merge all blob reports ──────────────────────────────
      - name: Download blob reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern:        blob-report-*
          path:           all-blobs/
          merge-multiple: true

      - name: Merge HTML report
        run: |
          BLOB_COUNT=$(find all-blobs -name '*.zip' 2>/dev/null | wc -l | tr -d ' ')
          if [ "$BLOB_COUNT" -gt 0 ]; then
            echo "Merging $BLOB_COUNT blob(s)…"
            npx playwright merge-reports \
              --reporter html \
              ./all-blobs
          else
            echo "No blob reports — creating placeholder"
            mkdir -p playwright-report
            printf '<!DOCTYPE html><html><body><h2>No test results</h2></body></html>' \
              > playwright-report/index.html
          fi

      # ── Stats: aggregate all JSON results ────────────────────────────────
      - name: Download JSON results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern:        json-results-*
          path:           json-results/
          merge-multiple: true

      - name: Parse combined results
        if: always()
        run: |
          TOTAL_PASSED=0; TOTAL_VISUAL_FAIL=0; TOTAL_EXEC_FAIL=0; TOTAL_SKIPPED=0

          for f in json-results/results-*.json; do
            [ -f "$f" ] || continue

            P=$(jq '.stats.expected // 0' "$f")
            TOTAL_PASSED=$((TOTAL_PASSED + P))

            S=$(jq '.stats.skipped // 0' "$f")
            TOTAL_SKIPPED=$((TOTAL_SKIPPED + S))

            V=$(jq '[
              .. | objects | select(has("tests")) | .tests[] |
              select(
                (.results[0].status == "failed" or .results[0].status == "timedOut") and
                (.results[0].error.message // "" | test("screenshot|toHaveScreenshot|Screenshot"; "i"))
              )
            ] | length' "$f")
            TOTAL_VISUAL_FAIL=$((TOTAL_VISUAL_FAIL + V))

            E=$(jq '[
              .. | objects | select(has("tests")) | .tests[] |
              select(
                (.results[0].status == "failed" or .results[0].status == "timedOut") and
                (.results[0].error.message // "" | test("screenshot|toHaveScreenshot|Screenshot"; "i") | not)
              )
            ] | length' "$f")
            TOTAL_EXEC_FAIL=$((TOTAL_EXEC_FAIL + E))
          done

          TOTAL_FAIL=$((TOTAL_VISUAL_FAIL + TOTAL_EXEC_FAIL))

          echo "PASSED_COUNT=$TOTAL_PASSED"           >> $GITHUB_ENV
          echo "SKIPPED_COUNT=$TOTAL_SKIPPED"         >> $GITHUB_ENV
          echo "VISUAL_FAIL_COUNT=$TOTAL_VISUAL_FAIL" >> $GITHUB_ENV
          echo "EXEC_ERROR_COUNT=$TOTAL_EXEC_FAIL"    >> $GITHUB_ENV
          echo "TOTAL_FAIL_COUNT=$TOTAL_FAIL"         >> $GITHUB_ENV

          echo "────────────────────────────────────────────"
          echo "  Browsers selected : ${{ github.event.inputs.browsers || 'all' }}"
          echo "  Shards per browser: 3  (runners total: $(echo '${{ needs.compute-matrix.outputs.browsers }}' | jq 'length * 3'))"
          echo "  Passed            : $TOTAL_PASSED"
          echo "  Skipped           : $TOTAL_SKIPPED"
          echo "  Visual diffs      : $TOTAL_VISUAL_FAIL"
          echo "  Exec errors       : $TOTAL_EXEC_FAIL"
          echo "  Total failed      : $TOTAL_FAIL"
          echo "────────────────────────────────────────────"

      # ── Deploy HTML report (always — teams need to see baseline captures) ─
      - name: Deploy HTML report
        if: always()
        id: cf-deploy
        uses: cloudflare/pages-action@v1
        continue-on-error: true
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT }}
          directory:   playwright-report
          branch:      ${{ env.TEST_ENV }}

      # ── Notify Slack ──────────────────────────────────────────────────────
      - name: Notify Slack
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ENV="${{ env.TEST_ENV }}"
          BASELINE_ENV="${{ env.BASELINE_ENV }}"
          BROWSERS="${{ github.event.inputs.browsers || 'all' }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          START_TIME="${{ needs.record-start.outputs.start-time }}"
          END_TIME=$(date +%s)
          ELAPSED=$(( END_TIME - START_TIME ))
          DURATION="$(( ELAPSED / 60 ))m $(( ELAPSED % 60 ))s"

          case "$BROWSERS" in
            chromium-only) MATRIX_LABEL="Chrome · Desktop+Tablet+Mobile · 3 shards" ;;
            firefox-only)  MATRIX_LABEL="Firefox · Desktop+Tablet+Mobile · 3 shards" ;;
            webkit-only)   MATRIX_LABEL="Safari · Desktop+Tablet+Mobile · 3 shards" ;;
            *)             MATRIX_LABEL="Chrome+Firefox+Safari × Desktop+Tablet+Mobile — 9 runners" ;;
          esac

          TOTAL_FAIL="${{ env.TOTAL_FAIL_COUNT }}"
          if [ "$TOTAL_FAIL" -gt 0 ]; then
            ICON="❌"; COLOR="#ef4444"; STATUS_LABEL="${TOTAL_FAIL} test(s) failed"
          else
            ICON="✅"; COLOR="#22c55e"; STATUS_LABEL="All tests passed"
          fi

          [ "$ENV" = "$BASELINE_ENV" ] \
            && COMPARING="Same-Env: ${ENV^^} Run #${{ github.run_number }}" \
            || COMPARING="Cross-Env: ${BASELINE_ENV^^} → ${ENV^^} Run #${{ github.run_number }}"

          BREAKDOWN="✅ ${{ env.PASSED_COUNT }} passed"
          [ "${{ env.SKIPPED_COUNT }}" -gt 0 ]     && BREAKDOWN="$BREAKDOWN  ·  ⏭ ${{ env.SKIPPED_COUNT }} skipped"
          [ "${{ env.VISUAL_FAIL_COUNT }}" -gt 0 ] && BREAKDOWN="$BREAKDOWN  ·  ❌ ${{ env.VISUAL_FAIL_COUNT }} visual diffs"
          [ "${{ env.EXEC_ERROR_COUNT }}" -gt 0 ]  && BREAKDOWN="$BREAKDOWN  ·  ⚠️ ${{ env.EXEC_ERROR_COUNT }} exec errors"

          PAYLOAD=$(jq -n \
            --arg icon       "$ICON"            \
            --arg comparing  "$COMPARING"        \
            --arg status     "$STATUS_LABEL"     \
            --arg color      "$COLOR"            \
            --arg env_field  "${ENV^^}"          \
            --arg duration   "$DURATION"         \
            --arg matrix     "$MATRIX_LABEL"     \
            --arg breakdown  "$BREAKDOWN"        \
            --arg report_url "$REPORT_URL"       \
            --arg run_url    "$RUN_URL"          \
            --arg run_num    "${{ github.run_number }}" \
            '{
              text: ($icon + " Cross-Browser Visual — " + $comparing + " — " + $status),
              attachments: [{
                color: $color,
                blocks: [
                  { type: "header",
                    text: { type: "plain_text",
                            text: "🌐 Cross-Browser Visual · Parallel", emoji: true }},
                  { type: "section", fields: [
                      { type: "mrkdwn", text: ("*Comparing*\n`"  + $comparing + "`") },
                      { type: "mrkdwn", text: ("*Status*\n"      + $icon + " " + $status) },
                      { type: "mrkdwn", text: ("*Test Env*\n`"   + $env_field + "`") },
                      { type: "mrkdwn", text: ("*Duration*\n"    + $duration) }
                  ]},
                  { type: "section",
                    text: { type: "mrkdwn", text: ("*Matrix*\n" + $matrix) }},
                  { type: "section",
                    text: { type: "mrkdwn", text: $breakdown }},
                  { type: "actions", elements: [
                      { type: "button",
                        text: { type: "plain_text", text: "📊 HTML Report", emoji: true },
                        url: $report_url, style: "primary" },
                      { type: "button",
                        text: { type: "plain_text",
                                text: ("⚙️ Run #" + $run_num), emoji: true },
                        url: $run_url }
                  ]}
                ]
              }]
            }')

          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          ENV="${{ env.TEST_ENV }}"
          BASELINE_ENV="${{ env.BASELINE_ENV }}"
          BROWSERS="${{ github.event.inputs.browsers || 'all' }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"

          case "$ENV" in
            dev)  BASE_URL="https://drupal.dev.energysafetycanada.com"  ;;
            test) BASE_URL="https://drupal.test.energysafetycanada.com" ;;
            uat)  BASE_URL="https://drupal.uat.energysafetycanada.com"  ;;
            beta) BASE_URL="https://beta.energysafetycanada.com"        ;;
            prod) BASE_URL="https://energysafetycanada.com"             ;;
            *)    BASE_URL="$ENV" ;;
          esac

          [ "$ENV" = "$BASELINE_ENV" ] \
            && COMPARING="🔁 Same-Env: \`${ENV^^}\` Run #${{ github.run_number }}" \
            || COMPARING="🔀 Cross-Env: \`${BASELINE_ENV^^}\` → \`${ENV^^}\` Run #${{ github.run_number }}"

          case "$BROWSERS" in
            chromium-only) MATRIX_LABEL="Chrome · Desktop · Tablet · Mobile · 3 shards" ;;
            firefox-only)  MATRIX_LABEL="Firefox · Desktop · Tablet · Mobile · 3 shards" ;;
            webkit-only)   MATRIX_LABEL="Safari · Desktop · Tablet · Mobile · 3 shards"  ;;
            *)             MATRIX_LABEL="Chrome + Firefox + Safari × Desktop + Tablet + Mobile — **9 parallel runners**" ;;
          esac

          {
            echo "## Cross-Browser Visual · Parallel Execution"
            echo "| | |"
            echo "|---|---|"
            echo "| **Comparing**        | ${COMPARING} |"
            echo "| **Test environment** | \`${ENV^^}\` |"
            echo "| **Baseline env**     | \`${BASELINE_ENV^^}\` |"
            echo "| **Base URL**         | ${BASE_URL} |"
            echo "| **Matrix**           | ${MATRIX_LABEL} |"
            echo "| **Passed**           | ${{ env.PASSED_COUNT }} |"
            echo "| **Skipped**          | ${{ env.SKIPPED_COUNT }} |"
            echo "| **Visual diffs**     | ${{ env.VISUAL_FAIL_COUNT }} |"
            echo "| **Execution errors** | ${{ env.EXEC_ERROR_COUNT }} |"
            echo "| **Run**              | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            [ -n "$REPORT_URL" ] && echo "| **HTML Report**      | [$REPORT_URL]($REPORT_URL) |"
          } >> $GITHUB_STEP_SUMMARY

      # ─────────────────────────────────────────────────────────────────────
      # Baseline saving (runs after reporting so deploy/Slack are never blocked)
      #
      # For each browser that was tested:
      #   1. Download the existing baseline artifact
      #   2. Apply snapshot-delta from all 3 shards  (new pages)
      #   3. Apply test-actuals from all 3 shards    (roll-forward changed pages)
      #   4. Save updated baseline
      # ─────────────────────────────────────────────────────────────────────

      - name: Download snapshot deltas
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern:        snapshot-delta-*
          path:           all-deltas/
          merge-multiple: false

      - name: Download test actuals
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern:        test-actuals-*
          path:           all-actuals/
          merge-multiple: false

      - name: Download baseline (chromium)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name:             visual-cb-baseline-${{ env.BASELINE_ENV }}-chromium
          path:             downloaded-baseline-chromium/
          workflow:         visual-cross-browser.yml
          search_artifacts: true

      - name: Download baseline (firefox)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name:             visual-cb-baseline-${{ env.BASELINE_ENV }}-firefox
          path:             downloaded-baseline-firefox/
          workflow:         visual-cross-browser.yml
          search_artifacts: true

      - name: Download baseline (webkit)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name:             visual-cb-baseline-${{ env.BASELINE_ENV }}-webkit
          path:             downloaded-baseline-webkit/
          workflow:         visual-cross-browser.yml
          search_artifacts: true

      - name: Merge and update baselines
        if: always()
        run: |
          TEST_ENV="${{ env.TEST_ENV }}"
          # Only process browsers that were actually tested this run
          BROWSERS_JSON='${{ needs.compute-matrix.outputs.browsers }}'
          BROWSERS=$(echo "$BROWSERS_JSON" | jq -r '.[]')

          for BROWSER in $BROWSERS; do
            echo "── $BROWSER ──────────────────────────────────────────────"
            FINAL="baseline-final/${BROWSER}"
            mkdir -p "$FINAL"

            # 1. Start from the downloaded baseline
            SRC="downloaded-baseline-${BROWSER}"
            if [ -d "$SRC" ] && [ "$(find "$SRC" -name '*.png' 2>/dev/null | wc -l)" -gt 0 ]; then
              cp -r "$SRC/." "$FINAL/"
              echo "  Copied $(find "$SRC" -name '*.png' | wc -l) baseline files"
            else
              echo "  No existing baseline — starting fresh"
            fi

            # 2. Apply snapshot delta from all 3 shards (new pages only)
            NEW_TOTAL=0
            for SHARD in 1 2 3; do
              DELTA="all-deltas/snapshot-delta-${BROWSER}-${SHARD}"
              [ -d "$DELTA" ] || continue
              COUNT=$(find "$DELTA" -name '*.png' 2>/dev/null | wc -l | tr -d ' ')
              [ "$COUNT" -eq 0 ] && continue
              (cd "$DELTA" && find . -name '*.png') | while IFS= read -r rel; do
                rel="${rel#./}"
                mkdir -p "${FINAL}/$(dirname "$rel")"
                cp "${DELTA}/${rel}" "${FINAL}/${rel}"
              done
              echo "  Shard $SHARD delta: $COUNT new snapshot(s)"
              NEW_TOTAL=$((NEW_TOTAL + COUNT))
            done
            [ "$NEW_TOTAL" -eq 0 ] && echo "  No new snapshots (all baselines already existed)"

            # 3. Roll baseline forward with actual screenshots from all 3 shards
            ROLLED=0
            for SHARD in 1 2 3; do
              ACTUALS="all-actuals/test-actuals-${BROWSER}-${SHARD}"
              [ -d "$ACTUALS" ] || continue
              while IFS= read -r actual; do
                snapname=$(basename "$actual" | sed 's/-actual\.png$/.png/')
                snapshot=$(find "$FINAL" -name "$snapname" 2>/dev/null | head -1)
                if [ -n "$snapshot" ]; then
                  cp "$actual" "$snapshot"
                  ROLLED=$((ROLLED + 1))
                fi
              done < <(find "$ACTUALS" -name '*.png' 2>/dev/null)
            done
            echo "  Rolled forward: $ROLLED screenshot(s)"

            # 4. Write metadata
            cat > "${FINAL}/baseline-meta.json" <<EOF
          {
            "env":        "${TEST_ENV}",
            "browser":    "${BROWSER}",
            "run_number": "${{ github.run_number }}",
            "run_id":     "${{ github.run_id }}",
            "branch":     "${{ github.ref_name }}",
            "date":       "$(date -u '+%Y-%m-%d %H:%M UTC')"
          }
          EOF
            echo "  Saved."
          done

      - name: Save baseline (chromium)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:            visual-cb-baseline-${{ env.TEST_ENV }}-chromium
          path:            baseline-final/chromium/
          retention-days:  3
          overwrite:       true
          if-no-files-found: ignore

      - name: Save baseline (firefox)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:            visual-cb-baseline-${{ env.TEST_ENV }}-firefox
          path:            baseline-final/firefox/
          retention-days:  3
          overwrite:       true
          if-no-files-found: ignore

      - name: Save baseline (webkit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name:            visual-cb-baseline-${{ env.TEST_ENV }}-webkit
          path:            baseline-final/webkit/
          retention-days:  3
          overwrite:       true
          if-no-files-found: ignore
