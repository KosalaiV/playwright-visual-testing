name: Visual Test (Advanced)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test against'
        required: true
        default: 'uat'
        type: choice
        options: [dev, test, uat, beta, prod]

      baseline_env:
        description: 'Baseline environment to compare against (leave empty = same as environment)'
        required: false
        default: ''
        type: string

permissions:
  actions:  read
  contents: read

env:
  TEST_ENV:     ${{ github.event.inputs.environment || 'uat' }}
  BASELINE_ENV: ${{ github.event.inputs.baseline_env || github.event.inputs.environment || 'uat' }}

jobs:

  visual-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      # ── Detect validation mode ────────────────────────────────────────────────
      - name: Detect validation mode
        run: |
          TEST_ENV="${{ env.TEST_ENV }}"
          BASELINE_ENV="${{ env.BASELINE_ENV }}"

          if [ "$TEST_ENV" = "$BASELINE_ENV" ]; then
            echo "VALIDATION_MODE=same-env" >> $GITHUB_ENV
            echo "📌 Mode: Same-Environment — will compare ${TEST_ENV^^} against its own previous baseline"
          else
            echo "VALIDATION_MODE=cross-env" >> $GITHUB_ENV
            echo "📌 Mode: Cross-Environment — will compare ${BASELINE_ENV^^} baseline against ${TEST_ENV^^}"
          fi

      # ── Clear git-committed local snapshots ──────────────────────────────────
      - name: Clear local snapshots
        run: rm -rf snapshots/

      # ── Download baseline ─────────────────────────────────────────────────────
      - name: Download baseline
        id: download-baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: visual-baseline-${{ env.BASELINE_ENV }}
          path: snapshots/
          workflow: visual-test-advanced.yml
          search_artifacts: true

      # ── Read baseline metadata / handle missing baseline ─────────────────────
      - name: Read baseline metadata
        run: |
          TEST_ENV="${{ env.TEST_ENV }}"
          BASELINE_ENV="${{ env.BASELINE_ENV }}"
          VALIDATION_MODE="${{ env.VALIDATION_MODE }}"
          META="snapshots/baseline-meta.json"

          if [ -f "$META" ]; then
            PREV_ENV=$(jq -r '.env   // "unknown"' "$META")
            PREV_RUN=$(jq -r '.run_number // "?"'  "$META")
            PREV_DATE=$(jq -r '.date // "unknown"' "$META")
            SNAPSHOT_COUNT=$(find snapshots -name '*.png' | wc -l | tr -d ' ')
            echo "PREV_ENV=$PREV_ENV"   >> $GITHUB_ENV
            echo "PREV_RUN=$PREV_RUN"   >> $GITHUB_ENV
            echo "PREV_DATE=$PREV_DATE" >> $GITHUB_ENV
            echo "BASELINE_FOUND=true"  >> $GITHUB_ENV

            if [ "$VALIDATION_MODE" = "cross-env" ]; then
              echo ""
              echo "╔══════════════════════════════════════════════════════════╗"
              echo "║  CROSS-ENVIRONMENT COMPARISON                            ║"
              echo "║  Baseline : ${BASELINE_ENV^^} — Run #${PREV_RUN} — ${PREV_DATE}"
              echo "║  Testing  : ${TEST_ENV^^}"
              echo "║  Snapshots: ${SNAPSHOT_COUNT}"
              echo "╚══════════════════════════════════════════════════════════╝"
            else
              echo ""
              echo "╔══════════════════════════════════════════════════════════╗"
              echo "║  SAME-ENVIRONMENT REGRESSION CHECK                       ║"
              echo "║  Baseline : ${BASELINE_ENV^^} — Run #${PREV_RUN} — ${PREV_DATE}"
              echo "║  Testing  : ${TEST_ENV^^}"
              echo "║  Snapshots: ${SNAPSHOT_COUNT}"
              echo "╚══════════════════════════════════════════════════════════╝"
            fi

          else
            echo "PREV_ENV=none"  >> $GITHUB_ENV
            echo "PREV_RUN="      >> $GITHUB_ENV
            echo "PREV_DATE="     >> $GITHUB_ENV
            echo "BASELINE_FOUND=false" >> $GITHUB_ENV

            if [ "$VALIDATION_MODE" = "cross-env" ]; then
              echo ""
              echo "╔══════════════════════════════════════════════════════════╗"
              echo "║  ⚠️  NO BASELINE FOUND FOR ${BASELINE_ENV^^}                    ║"
              echo "║                                                          ║"
              echo "║  To use cross-environment comparison:                    ║"
              echo "║    1. Run with environment=${BASELINE_ENV^^} to create its baseline ║"
              echo "║    2. Then re-run with environment=${TEST_ENV^^}, baseline_env=${BASELINE_ENV^^}  ║"
              echo "║                                                          ║"
              echo "║  This run will proceed and create a baseline for ${TEST_ENV^^}. ║"
              echo "╚══════════════════════════════════════════════════════════╝"
            else
              echo ""
              echo "╔══════════════════════════════════════════════════════════╗"
              echo "║  FIRST RUN — No baseline found for ${TEST_ENV^^}               ║"
              echo "║  This run will create the baseline for ${TEST_ENV^^}.          ║"
              echo "║  Next run options:                                       ║"
              echo "║    • Same-env check  → environment=${TEST_ENV^^}               ║"
              echo "║    • Cross-env check → environment=<other>, baseline_env=${TEST_ENV^^} ║"
              echo "╚══════════════════════════════════════════════════════════╝"
            fi
          fi

      # ── Run tests ─────────────────────────────────────────────────────────────
      # Uses html+github+json reporters so results.json is available for Slack parsing.
      - name: Run visual tests
        continue-on-error: true
        env:
          HTACCESS_USER: ${{ secrets.HTACCESS_USER }}
          HTACCESS_PASS: ${{ secrets.HTACCESS_PASS }}
          STUDENT_USERNAME: ${{ secrets.STUDENT_USERNAME }}
          STUDENT_PASSWORD: ${{ secrets.STUDENT_PASSWORD }}
          INSTRUCTOR_USERNAME: ${{ secrets.INSTRUCTOR_USERNAME }}
          INSTRUCTOR_PASSWORD: ${{ secrets.INSTRUCTOR_PASSWORD }}
          COMPANYADMIN_USERNAME: ${{ secrets.COMPANYADMIN_USERNAME }}
          COMPANYADMIN_PASSWORD: ${{ secrets.COMPANYADMIN_PASSWORD }}
          PROVIDER_USERNAME: ${{ secrets.PROVIDER_USERNAME }}
          PROVIDER_PASSWORD: ${{ secrets.PROVIDER_PASSWORD }}
          MULTIROLE_USERNAME: ${{ secrets.MULTIROLE_USERNAME }}
          MULTIROLE_PASSWORD: ${{ secrets.MULTIROLE_PASSWORD }}
          EVALUATOR_USERNAME: ${{ secrets.EVALUATOR_USERNAME }}
          EVALUATOR_PASSWORD: ${{ secrets.EVALUATOR_PASSWORD }}
          AUDITOR_USERNAME: ${{ secrets.AUDITOR_USERNAME }}
          AUDITOR_PASSWORD: ${{ secrets.AUDITOR_PASSWORD }}
          ASSESSOR_USERNAME: ${{ secrets.ASSESSOR_USERNAME }}
          ASSESSOR_PASSWORD: ${{ secrets.ASSESSOR_PASSWORD }}
          CONTENTEDITOR_USERNAME: ${{ secrets.CONTENTEDITOR_USERNAME }}
          CONTENTEDITOR_PASSWORD: ${{ secrets.CONTENTEDITOR_PASSWORD }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: results.json
        run: |
          START_TIME=$(date +%s)
          echo "START_TIME=$START_TIME" >> $GITHUB_ENV
          if TEST_ENV=${{ env.TEST_ENV }} npx playwright test esc.visual esc.portal \
            --project=desktop \
            --workers=20 \
            --update-snapshots=missing \
            --reporter=html,github,json; then
            echo "TEST_STATUS=passed" >> $GITHUB_ENV
          else
            echo "TEST_STATUS=failed" >> $GITHUB_ENV
          fi

      # ── Parse test results ────────────────────────────────────────────────────
      # Categorises failures into:
      #   - Visual diff failures  → threshold exceeded (link to HTML report)
      #   - Execution errors      → auth, timeout, invalid URL, etc (listed in Slack)
      - name: Parse test results
        if: always()
        run: |
          RESULTS="results.json"
          ENV="${{ env.TEST_ENV }}"

          if [ ! -f "$RESULTS" ]; then
            echo "⚠️ results.json not found — Playwright may have failed to start"
            echo "PASSED_COUNT=0"      >> $GITHUB_ENV
            echo "VISUAL_FAIL_COUNT=0" >> $GITHUB_ENV
            echo "EXEC_ERROR_COUNT=0"  >> $GITHUB_ENV
            exit 0
          fi

          # ── Counts from stats block ───────────────────────────────────────────
          PASSED=$(jq '.stats.expected // 0' "$RESULTS")
          echo "PASSED_COUNT=$PASSED" >> $GITHUB_ENV

          # ── Flatten all failed/timedOut test results ──────────────────────────
          ALL_FAILURES=$(jq -r '
            [.. | objects | select(has("tests")) |
              .title as $spec |
              .tests[] |
              select(.results[0].status == "failed" or .results[0].status == "timedOut") |
              {
                spec: $spec,
                status: .results[0].status,
                error: (.results[0].error.message // "Unknown error")
              }
            ]
          ' "$RESULTS")

          # ── Visual diff failures (screenshot threshold exceeded) ───────────────
          VISUAL_FAILS=$(echo "$ALL_FAILURES" | jq '[.[] | select(.error | test("screenshot|toHaveScreenshot|Screenshot"; "i"))]')
          VISUAL_COUNT=$(echo "$VISUAL_FAILS" | jq 'length')
          echo "VISUAL_FAIL_COUNT=$VISUAL_COUNT" >> $GITHUB_ENV
          if [ "$VISUAL_COUNT" -gt 0 ]; then
            echo "HAS_VISUAL_DIFFS=true" >> $GITHUB_ENV
          else
            echo "HAS_VISUAL_DIFFS=false" >> $GITHUB_ENV
          fi

          # ── Execution errors (auth, timeout, invalid URL, network, etc.) ────────
          EXEC_FAILS=$(echo "$ALL_FAILURES" | jq '[.[] | select(.error | test("screenshot|toHaveScreenshot|Screenshot"; "i") | not)]')
          EXEC_COUNT=$(echo "$EXEC_FAILS" | jq 'length')
          echo "EXEC_ERROR_COUNT=$EXEC_COUNT" >> $GITHUB_ENV

          # ── Format exec errors for Slack (max 5 items, with error type label) ────
          # Error type is derived from the error message:
          #   Timeout      → page.goto / locator timeout
          #   Auth Error   → 401 / 403 / Unauthorized / Forbidden
          #   Not Found    → 404 / ERR_NAME_NOT_RESOLVED / net::ERR
          #   Network      → ERR_ / ECONNREFUSED / ENOTFOUND
          #   Unknown      → anything else
          if [ "$EXEC_COUNT" -gt 0 ]; then
            EXEC_DETAIL=$(echo "$EXEC_FAILS" | jq -r '
              .[:5][] |
              (.error | split("\n")[0]) as $first_line |
              (
                if ($first_line | test("timeout|Timeout|exceeded.*ms"; "i")) then "⏱ Timeout"
                elif ($first_line | test("401|403|Unauthorized|Forbidden|auth|Auth"; "i")) then "🔐 Auth Error"
                elif ($first_line | test("404|Not Found|ERR_NAME_NOT_RESOLVED"; "i")) then "🔍 Not Found"
                elif ($first_line | test("net::|ERR_|ECONNREFUSED|ENOTFOUND"; "i")) then "🌐 Network Error"
                else "⚠️ Error"
                end
              ) as $type |
              "[\($type)]  \(.spec)\n    \($first_line | .[0:140])"
            ')
            {
              echo "EXEC_ERRORS_DETAIL<<ENDOFVAR"
              echo "$EXEC_DETAIL"
              echo "ENDOFVAR"
            } >> $GITHUB_ENV
          fi

          echo "── Failure summary ──────────────────────────────────────"
          echo "  Passed        : $PASSED"
          echo "  Visual diffs  : $VISUAL_COUNT"
          echo "  Exec errors   : $EXEC_COUNT"
          echo "─────────────────────────────────────────────────────────"

      # ── Update baseline with actual screenshots from this run ────────────────
      # --update-snapshots=missing never updates existing baselines — even when a
      # test fails. This means the very first baseline would be stuck forever.
      # Fix: after every run, copy the "actual" screenshots that Playwright
      # captured (saved in test-results/) over their corresponding baseline in
      # snapshots/. This makes the CURRENT run's state the baseline for the next
      # run, while still reporting diffs in the HTML report for this run.
      - name: Update baseline with current screenshots
        if: always()
        run: |
          UPDATED=0
          while IFS= read -r actual; do
            # actual filename e.g. dashboard-student-desktop-actual.png
            # strip "-actual" suffix → dashboard-student-desktop.png
            snapname=$(basename "$actual" | sed 's/-actual\.png$/.png/')
            snapshot=$(find snapshots -name "$snapname" 2>/dev/null | head -1)
            if [ -n "$snapshot" ]; then
              cp "$actual" "$snapshot"
              UPDATED=$((UPDATED + 1))
              echo "  ✔ Updated: $snapshot"
            fi
          done < <(find test-results -name "*-actual.png" 2>/dev/null)

          if [ "$UPDATED" -gt 0 ]; then
            echo "── Baseline updated with $UPDATED screenshot(s) from this run ──"
          else
            echo "── No actual screenshots found — baseline unchanged ──"
          fi

      # ── Write baseline metadata for the next run ──────────────────────────────
      - name: Write baseline metadata
        if: always()
        run: |
          mkdir -p snapshots
          cat <<EOF > snapshots/baseline-meta.json
          {
            "env":        "${{ env.TEST_ENV }}",
            "run_number": "${{ github.run_number }}",
            "run_id":     "${{ github.run_id }}",
            "branch":     "${{ github.ref_name }}",
            "date":       "$(date -u '+%Y-%m-%d %H:%M UTC')"
          }
          EOF
          echo "Baseline metadata written for next run:"
          cat snapshots/baseline-meta.json

      # ── Deploy HTML report to Cloudflare Pages ────────────────────────────────
      # Only deployed when there are visual diff failures — execution errors don't
      # produce diff images so there's nothing useful to show in the HTML report.
      - name: Deploy to Cloudflare Pages
        if: always() && env.HAS_VISUAL_DIFFS == 'true'
        id: cf-deploy
        uses: cloudflare/pages-action@v1
        continue-on-error: true
        with:
          apiToken:    ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId:   ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CF_PAGES_PROJECT }}
          directory:   playwright-report
          branch:      ${{ env.TEST_ENV }}

      # ── Post to Slack ─────────────────────────────────────────────────────────
      # Slack message contains:
      #   1. Comparison context (mode, envs, run numbers)
      #   2. Results breakdown (passed / visual diffs / exec errors)
      #   3. Execution error details inline (test name + first line of error, max 5)
      #   4. Visual diff failures → link to HTML report only (full diff is in the report)
      - name: Notify Slack
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ENV="${{ env.TEST_ENV }}"
          BASELINE_ENV="${{ env.BASELINE_ENV }}"
          STATUS="${{ env.TEST_STATUS }}"
          PREV_RUN="${{ env.PREV_RUN }}"
          BASELINE_FOUND="${{ env.BASELINE_FOUND }}"
          VALIDATION_MODE="${{ env.VALIDATION_MODE }}"
          PASSED_COUNT="${{ env.PASSED_COUNT }}"
          VISUAL_FAIL_COUNT="${{ env.VISUAL_FAIL_COUNT }}"
          EXEC_ERROR_COUNT="${{ env.EXEC_ERROR_COUNT }}"
          EXEC_ERRORS_DETAIL="${{ env.EXEC_ERRORS_DETAIL }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Duration
          END_TIME=$(date +%s)
          ELAPSED=$(( END_TIME - ${{ env.START_TIME }} ))
          DURATION_MIN=$(( ELAPSED / 60 ))
          DURATION_SEC=$(( ELAPSED % 60 ))
          DURATION="${DURATION_MIN}m ${DURATION_SEC}s"

          # ── Overall status ──────────────────────────────────────────────────────
          if [ "$BASELINE_FOUND" = "false" ]; then
            ICON="📸"; COLOR="#3b82f6"
            STATUS_LABEL="Baseline created — no comparison yet"
          elif [ "$VISUAL_FAIL_COUNT" -gt 0 ] && [ "$EXEC_ERROR_COUNT" -gt 0 ]; then
            ICON="❌"; COLOR="#ef4444"
            STATUS_LABEL="Visual diffs + execution errors detected"
          elif [ "$VISUAL_FAIL_COUNT" -gt 0 ]; then
            ICON="❌"; COLOR="#ef4444"
            STATUS_LABEL="Visual differences detected"
          elif [ "$EXEC_ERROR_COUNT" -gt 0 ]; then
            ICON="⚠️"; COLOR="#f59e0b"
            STATUS_LABEL="Execution errors detected (no visual diffs)"
          else
            ICON="✅"; COLOR="#22c55e"
            STATUS_LABEL="All tests passed"
          fi

          # ── Comparison label ────────────────────────────────────────────────────
          if [ "$BASELINE_FOUND" = "false" ]; then
            if [ "$VALIDATION_MODE" = "cross-env" ]; then
              COMPARING="No ${BASELINE_ENV^^} baseline — run ${BASELINE_ENV^^} first, then retry cross-env"
            else
              COMPARING="First run — baseline created for ${ENV^^}"
            fi
          elif [ "$VALIDATION_MODE" = "cross-env" ]; then
            COMPARING="Cross-Env: ${BASELINE_ENV^^} (Run #${PREV_RUN}) → ${ENV^^} (Run #${{ github.run_number }})"
          else
            COMPARING="Same-Env: ${BASELINE_ENV^^} (Run #${PREV_RUN}) → ${ENV^^} (Run #${{ github.run_number }})"
          fi

          # ── Results breakdown line ──────────────────────────────────────────────
          BREAKDOWN="✅ Passed: ${PASSED_COUNT}"
          if [ "$VISUAL_FAIL_COUNT" -gt 0 ]; then
            BREAKDOWN="${BREAKDOWN}   |   ❌ Visual diffs: ${VISUAL_FAIL_COUNT} (see HTML report)"
          fi
          if [ "$EXEC_ERROR_COUNT" -gt 0 ]; then
            BREAKDOWN="${BREAKDOWN}   |   ⚠️ Exec errors: ${EXEC_ERROR_COUNT}"
          fi

          # ── Build exec errors block (only when errors exist) ─────────────────────
          # Each error shows: [type]  test name \n  error message
          # Links to GitHub Actions run only — HTML report is not deployed for exec errors.
          if [ "$EXEC_ERROR_COUNT" -gt 0 ] && [ -n "$EXEC_ERRORS_DETAIL" ]; then
            EXEC_BLOCK=$(jq -n \
              --arg env "${ENV^^}" \
              --arg detail "$EXEC_ERRORS_DETAIL" \
              --arg run_url "$RUN_URL" \
              --arg run_num "${{ github.run_number }}" \
              '{
                type: "section",
                text: {
                  type: "mrkdwn",
                  text: (
                    "*⚠️ Execution Errors on " + $env + ":*\n" +
                    $detail + "\n\n" +
                    "→ View run logs: <" + $run_url + "|GitHub Run #" + $run_num + ">"
                  )
                }
              }')
          else
            EXEC_BLOCK="null"
          fi

          # ── Build missing baseline hint (cross-env, no baseline found) ──────────
          if [ "$BASELINE_FOUND" = "false" ] && [ "$VALIDATION_MODE" = "cross-env" ]; then
            HINT_BLOCK=$(jq -n \
              --arg env "$BASELINE_ENV" \
              --arg test_env "$ENV" \
              '{"type": "section", "text": {"type": "mrkdwn", "text": ("*📋 Next steps:*\n1. Run this workflow with `environment=" + ($env | ascii_upcase) + "` (no baseline_env) to create its baseline\n2. Then re-run with `environment=" + ($test_env | ascii_upcase) + "`, `baseline_env=" + $env + "`")}}')
          else
            HINT_BLOCK="null"
          fi

          # ── Assemble full Slack payload using jq ────────────────────────────────
          HAS_VISUAL_DIFFS="${{ env.HAS_VISUAL_DIFFS }}"

          PAYLOAD=$(jq -n \
            --arg icon "$ICON" \
            --arg comparing "$COMPARING" \
            --arg status_label "$STATUS_LABEL" \
            --arg color "$COLOR" \
            --arg breakdown "$BREAKDOWN" \
            --arg status_field "${ICON} ${STATUS_LABEL}" \
            --arg env_field "${ENV^^}" \
            --arg duration "$DURATION" \
            --arg report_url "$REPORT_URL" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            --argjson exec_block "$EXEC_BLOCK" \
            --argjson hint_block "$HINT_BLOCK" \
            --arg has_visual_diffs "$HAS_VISUAL_DIFFS" \
            '{
              text: ($icon + " Visual Regression — " + $comparing + " — " + $status_label),
              attachments: [{
                color: $color,
                blocks: (
                  [
                    {
                      type: "header",
                      text: { type: "plain_text", text: "🎭 Visual Regression Report", emoji: true }
                    },
                    {
                      type: "section",
                      fields: [
                        { type: "mrkdwn", text: ("*Comparing*\n`" + $comparing + "`") },
                        { type: "mrkdwn", text: ("*Status*\n" + $status_field) },
                        { type: "mrkdwn", text: ("*Test Env*\n`" + $env_field + "`") },
                        { type: "mrkdwn", text: ("*Duration*\n" + $duration) }
                      ]
                    },
                    {
                      type: "section",
                      text: { type: "mrkdwn", text: $breakdown }
                    }
                  ]
                  + (if $exec_block != null then [$exec_block] else [] end)
                  + (if $hint_block != null then [$hint_block] else [] end)
                  + [
                    {
                      type: "actions",
                      elements: (
                        (if ($has_visual_diffs == "true" and $report_url != "") then [{
                          type: "button",
                          text: { type: "plain_text", text: "📊 View HTML Report", emoji: true },
                          url: $report_url,
                          style: "primary"
                        }] else [] end)
                        + [{
                          type: "button",
                          text: { type: "plain_text", text: ("⚙️ View Run #" + $run_num), emoji: true },
                          url: $run_url
                        }]
                      )
                    }
                  ]
                )
              }]
            }')

          curl -s -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"

      # ── Write job summary ─────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          ENV="${{ env.TEST_ENV }}"
          BASELINE_ENV="${{ env.BASELINE_ENV }}"
          PREV_RUN="${{ env.PREV_RUN }}"
          PREV_DATE="${{ env.PREV_DATE }}"
          BASELINE_FOUND="${{ env.BASELINE_FOUND }}"
          VALIDATION_MODE="${{ env.VALIDATION_MODE }}"
          REPORT_URL="${{ steps.cf-deploy.outputs.alias || steps.cf-deploy.outputs.url }}"

          case "$ENV" in
            dev)  BASE_URL="https://drupal.dev.energysafetycanada.com" ;;
            test) BASE_URL="https://drupal.test.energysafetycanada.com" ;;
            uat)  BASE_URL="https://drupal.uat.energysafetycanada.com" ;;
            beta) BASE_URL="https://beta.energysafetycanada.com" ;;
            prod) BASE_URL="https://energysafetycanada.com" ;;
            *)    BASE_URL="$ENV" ;;
          esac

          if [ "$BASELINE_FOUND" = "false" ]; then
            if [ "$VALIDATION_MODE" = "cross-env" ]; then
              COMPARING="⚠️ No \`${BASELINE_ENV^^}\` baseline found — run \`${BASELINE_ENV^^}\` first"
            else
              COMPARING="📸 First Run — baseline created for \`${ENV^^}\`"
            fi
          elif [ "$VALIDATION_MODE" = "cross-env" ]; then
            COMPARING="🔀 Cross-Env: \`${BASELINE_ENV^^}\` Run #${PREV_RUN} (${PREV_DATE}) → \`${ENV^^}\` Run #${{ github.run_number }}"
          else
            COMPARING="🔁 Same-Env: \`${BASELINE_ENV^^}\` Run #${PREV_RUN} (${PREV_DATE}) → \`${ENV^^}\` Run #${{ github.run_number }}"
          fi

          {
            echo "## Visual Regression Test Run"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Mode** | ${{ env.VALIDATION_MODE }} |"
            echo "| **Comparing** | ${COMPARING} |"
            echo "| **Test environment** | \`${ENV^^}\` |"
            echo "| **Baseline environment** | \`${BASELINE_ENV^^}\` |"
            echo "| **Base URL** | $BASE_URL |"
            echo "| **Viewport** | Desktop — 1440 × 900 |"
            echo "| **Passed** | ${{ env.PASSED_COUNT }} |"
            echo "| **Visual diffs** | ${{ env.VISUAL_FAIL_COUNT }} |"
            echo "| **Execution errors** | ${{ env.EXEC_ERROR_COUNT }} |"
            echo "| **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            if [ -n "$REPORT_URL" ]; then
              echo "| **HTML Report** | [$REPORT_URL]($REPORT_URL) |"
            fi
          } >> $GITHUB_STEP_SUMMARY

      # ── Save current run's snapshots as baseline for TEST_ENV ────────────────
      - name: Save baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline-${{ env.TEST_ENV }}
          path: snapshots/
          retention-days: 3
          overwrite: true
